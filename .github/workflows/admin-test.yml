name: 🧪 Admin Test
on:
  push:
    branches:
      - main
    paths:
      - 'spring-ai-alibaba-admin/**'
      - '.github/workflows/admin-test.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'spring-ai-alibaba-admin/**'
      - '.github/workflows/admin-test.yml'

permissions:
  contents: read

concurrency:
  group: admin-test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Admin module tests (JDK 17)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run admin module tests
        run: ./mvnw -B -ntp -f spring-ai-alibaba-admin/pom.xml test

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/**
            **/target/site/**
          retention-days: 7
